notes = "Promoted from a2kit's packages/formatter (tsv.py + prune.py) during a2kay's a2kit sunset (a2kay openspec/changes/sunset-a2kit-dependency). Fixes the origin's newline bug: stdlib csv QUOTE_MINIMAL left raw \\n inside quoted cells, breaking line-oriented agent readers — lean-wire escapes \\/\\t/\\n/\\r per cell instead. pydantic + stdlib leaf (T0). page-tsv composes it. Co-developed on the work/a2kay worktree; tag cut at end of the sunset spine swap. Born candidate."
