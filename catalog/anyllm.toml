notes = "One async, structured completion contract (LLMProvider) → a rich Completion (text + token/cost/latency); fail-loud AnyLLMError. Four backends behind one Capability: claude-code-cli (stdlib), claude-code-sdk, anthropic-api, openai-compatible (each SDK an opt-in extra). v0.2.0 evolved the v0.1 sync str contract to this superset per resolution 0007 (the monotonicity test) — the a2web Provider tier promoted in, not split off as a sibling. Cache-tier token→cost accounting rides inside; extract as a shared T0 only if a non-LLM holder wants it (reconcile-later)."
