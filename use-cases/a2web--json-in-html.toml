# A UseCase — one consumer PUBLISHES its dependency (glossary: satisfies -> UseCase).
# One file per (consumer x software); the consumer owns it. This is the retention
# claim: the software cannot be retired while an active UseCase points at it (Article VIII).
consumer = "a2web"
software = "json-in-html"
why = "Many pages carry a machine-readable answer the prose does not: a Product/Recipe/ItemList LD-JSON block, microdata, OpenGraph tags, or a window.__NEXT_DATA__ blob. a2web mines that structured payload before falling back to prose extraction, and ranks candidates so the answer-bearing one wins. The extraction is generic HTML substrate; which payload answers the question is a2web's policy."
needs = "extract_json_payloads(html) -> list[JsonPayload], rank_payloads, is_answer_bearing, plus is_json_content_type / sniff_json_body / parse_json_response for raw-JSON responses. JsonPayload carries (source, data, script_id, byte_size)."
sponsor = "Denis Tomilin"
requester = "a2web"
status = "active"          # active | retired
