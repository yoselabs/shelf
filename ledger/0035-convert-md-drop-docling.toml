note = "EVOLVE: supersedes ledger/0034 — dropped docling entirely from the `.pdf` chain instead of keeping it as fallback. `.pdf` is now `[PymupdfLlmEngine]` only, no fallback. PRIMARY REASON (not the typer conflict): a same-day re-scoring pass judged every engine's output for LLM-semantic-recoverability (can the facts/values/relationships be recovered regardless of markdown formatting) instead of visual/structural fidelity, extending the corpus with CJK (Japanese/Chinese service manuals), math-heavy (arXiv formula-dense paper), and infographic-dense (Toyota Integrated Report financial table + timeline) files -- bench/results/2026-07-09-findings.md 'Extended corpus addendum' and design.md D5 have the full evidence. Under that lens docling has one total, unrecoverable failure mode (100% of formulas dropped as `<!-- formula-not-decoded -->` on math-heavy content, zero fallback) while pymupdf4llm's structural defects all downgrade to cosmetic (CJK glyph-ID garbage confined to decorative icon legends never real prose; a 'broken' financial table where every value still lands on its correct row/year; an oddly-stacked but complete math matrix) -- no corpus file in the full 8-file run needed docling to recover content pymupdf4llm couldn't already deliver. markitdown (the other live PDF candidate) was also re-checked under this lens and ruled out as a broader replacement: it has two of its own genuine semantic failures (table_heavy.pdf's two-column reading order gets sentences from unrelated topics fused together; math_heavy.pdf severs Archimedes' pi-bounds claim `223/71 < pi < 22/7` from its own denominators across two disconnected locations) on exactly the axes -- reading order and math -- that matter most to an LLM reader. marker remains the only engine that renders math correctly but stays excluded on unchanged cost/license grounds (GPL-3.0, >30x-worse CPU-only runtime) -- a fidelity win on one axis doesn't clear the adoption bar. SECONDARY REASON (already established in ledger/0034, restated for completeness): removing docling also removes the unconditional `typer<0.25` pin (design.md D1) from `convert-md[documents]` for every consumer, not just a2web-shaped ones -- sufficient on its own to justify demoting docling in the prior delivery, but explicitly not the deciding reason for full removal this time; recording both reasons and their relative weight so a future reader does not mistake this for a dependency-conflict-only decision. Code: `DoclingEngine` deleted from `engines.py`/`dispatch.py`/`__init__.py`; `docling` dropped from the `documents` extra and package keywords; `bench/engines/run_docling.py` kept as an isolated D4 probe (re-verifiable later, no longer a real dependency so now added to root `[tool.ty.src]` exclude alongside marker/unstructured). Minor version bump (0.4.0 -> 0.5.0) per the shelf's semver discipline for behavior-changing engine swaps. `make check` green."
