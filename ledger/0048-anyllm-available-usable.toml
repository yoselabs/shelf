note = "EVOLVE: `ClaudeCodeSdkAdapter.available()` now means USABLE, not importable. It gated on `find_spec('claude_agent_sdk')` alone, so any environment with the Python extra installed reported the backend available. Two facts make that a false positive: the adapter is a thin wrapper that shells out to the `claude` binary, and recent SDK versions BUNDLE that binary inside the package -- so a container has the package AND a runnable CLI while having no logged-in session, and every completion returns empty text. Found from the consumer side: a2web deployed as a container had its configured OpenAI-compatible gateway never called, because a2web's `auto` order tries claude-code first and `available()` said yes forever; the empty answers surfaced as an `extraction_empty` hint ('retry or rephrase the question'), sending diagnosis toward page content for what was a backend-selection bug. Any consumer that ranks backends by `available()` has this bug. Now `available()` = `_find_cli() is not None and _session_credentials_present()`. `_find_cli` mirrors the SDK's own resolution order (bundled binary -> PATH -> its fixed fallback list) so the probe cannot disagree with what `complete()` does -- a plain `shutil.which` misses both the bundled binary and installs under `~/.claude/local`. `_session_credentials_present` checks CLAUDE_CODE_OAUTH_TOKEN, then `~/.claude/.credentials.json` (Linux and every container), then on Darwin the EXISTENCE of the Keychain item via `security find-generic-password` without `-w` -- a metadata query, so no secret is read and no auth prompt appears. Credentials rather than CLI presence is the discriminator precisely because the bundled binary makes CLI presence useless: the container has one. False-negative posture is deliberate -- a host storing credentials somewhere none of the three checks see reports unavailable and the caller picks another backend (degraded), whereas the opposite error silently shadows every working backend. Also fixed the same class of bug one layer down: `complete()`'s precondition guard raised 'claude-agent-sdk is not installed' for every failure, which can now mean 'no session'; it names which precondition failed. Minor bump 0.3.0 -> 0.4.0; 0.3.0 (ProviderName enum) was in pyproject but never tagged, so it got a CHANGELOG line too since a consumer hopping v0.2.0 -> v0.4.0 crosses both. Old tags intact. make check green (334 passed, 88.47% cov)."
