note = "ADOPT, first consumer of lean-wire, one day after the promote reached `main` (ledger 0050). a2web had vendored a2kit's encoder as `_tsv_compat.py` during its a2kit sunset -- a deliberate byte-for-byte copy whose docstring named `lean-wire` as its retirement condition, so this closes a loop that was designed in advance. Took `PruneEmpty` + `prune_dict` too, not just `encode_tsv`: a2web's copies were line-for-line identical to the shelf's, which is the cheapest possible confirmation that the promotion picked the right boundary. THE DELTA IS REAL, NOT COSMETIC, and exactly one golden moved. a2kit built TSV on stdlib `csv` with QUOTE_MINIMAL: a cell containing a newline gets wrapped in quotes but KEEPS the raw newline inside the field, so a2web's adversarial-cells golden was frozen with three records rendered across four physical lines. Any agent doing the obvious thing with a line-oriented format (split on newline) tore one record into several. lean-wire escapes instead, reversibly, so one record is exactly one line -- and a2web rewrote that scenario's anti-vacuity assertions to COUNT LINES rather than spot-check cells, since line count is the invariant the codec actually promises. Blessed as `lean-wire-escaping` in a2web's DELTAS.md. TWO FINDINGS BACK FOR THE SHELF. (1) lean-wire inherited a2kit's `TypeError` on rows that are neither BaseModel nor dict, verbatim. a2web hits it: `Heading` serializes as a compact `[level, text]` pair. Raising is judged CORRECT here -- fail-loud over errors-as-values, and a codec that silently accepts what it cannot tabulate is the worse contract -- but consumers must guard at the call site, and a2web's own guard (`wire._is_tsv_shaped`) is the reference: leave a non-tabular field as JSON, emit no `_format` sidecar, do not let it void the envelope. Worth a line in lean-wire's README; the adopting consumer should not have to discover it from a stack trace. (2) `dump_model_for_wire` went unused -- a2web's models carry their own `@model_serializer`, so the seam had nothing to do. Not a complaint (it is one thin function) but a datapoint for RECONCILE if no consumer ever calls it."
