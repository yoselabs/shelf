note = "PROMOTE x4, recorded retroactively at the merge that finally put them on `main`. The four packages were extracted, tagged, and pushed on `work/a2kay` but the branch never merged, so from every other session's point of view the promotion had not happened -- and no ledger row was ever appended, which is how it stayed invisible for as long as it did. This row is that gap closed, not a fresh delivery. THE STACK: `lean-wire` (T0) is the primitive -- `encode_tsv` + `PruneEmpty`, and it earns its existence over stdlib `csv` for one specific reason worth preserving: `csv` quotes a cell containing a newline but leaves the raw `\\n` inside the field, so an agent splitting the payload on `\\n` tears one record into several; `encode_tsv` escapes `\\`, `\\t`, `\\n`, `\\r` so one record is always exactly one physical line, reversibly. `page-tsv` (T1) owns the whole wire format in one place so an LLM-facing renderer and a machine-facing one cannot drift, with `consumer` as a caller-supplied parameter rather than sniffed from ambient context. `mcp-result-wire` (T2) is the FastMCP middleware over both, driven by explicit per-tool registries rather than framework tool metadata. `a2effect` (T0) is the typed-error foundation, pydantic-only and framework-free. MERGED, NOT REBASED: all four tags were already published against these exact commits, so rebasing would have left every consumer pin resolving to a commit unreachable from `main` -- the same guarantee 'never delete an old tag' protects, broken by another route. WHY IT MATTERS NOW: a2web completed its a2kit sunset on 2026-07-22 and hand-wrote replacements for the encoder and error envelope, including a vendored `_tsv_compat.py` explicitly marked as leaving with `lean-wire`. a2web also pins `a2effect` by tag against the *a2kit* repo because the shelf copy was unreachable from `main`; that pin can now come home. Two of a2web's three round-17 encoder defect reports (the presence guard and the already-a-string guard) were fixed in a2web's own `wire.py` rather than ported -- `lean-wire` should be checked against both before a2web adopts, or the adoption reintroduces what the sunset removed."
