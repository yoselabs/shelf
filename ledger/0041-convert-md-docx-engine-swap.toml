note = "PROMOTE/EVOLVE: made convert-md's `.docx` engine choice evidence-backed (it was inherited verbatim from R142 on one unverified claim -- pandoc's `--track-changes=all` preserves redlines -- and never benched). Extended the PDF bench harness to a docx capability-grid: 6 synthesized single-capability fixtures (design.md D2 -- synthesize for semantic formats, the inverse of the PDF corpus's real-document rule), scored pandoc (both track-changes modes), markitdown, and mammoth model-free. DECISION: drop pandoc entirely, `.docx` becomes `[MammothEngine, MarkitdownEngine]`. Pandoc's sole differentiator turned out to be a live latent bug -- `--track-changes=all` (exactly what convert-md shipped through v0.6.0) rendered tracked changes as HTML-span redline soup (both deleted and inserted text jammed together) injected into the vault; in accept mode it merely equals the light engines, and it left dangling image refs. mammoth (featherweight -- only dep `cobble`) renders clean semantic HTML routed through convert-md's own `source_kind=\"clean\"` path; markitdown stays as the cheap already-a-dep fallback. A load-bearing side-finding (design.md D7): the table divergence was markdownify (markitdown's HTML->md tail) vs html2text, NOT the docx engine -- markitdown wraps mammoth, both consume the same header-less HTML; and routing docx through the generic `convert_html()` was much worse because trafilatura is a web-page boilerplate remover that strips headings and explodes tables on clean fragments (verified trafilatura is still correct on real full pages, so a2web is healthy -- the two paths must never cross). This motivated adding `source_kind: Literal[\"web_page\",\"clean\"]` to `convert_html` (default web_page, a2web untouched): one HTML->markdown render back-end shared by docx and the web path, not a third opinion. Code: `PandocEngine`->`MammothEngine` in engines.py/dispatch.py/__init__; `pypandoc-binary` (a ~100MB+ binary) dropped from `convert-md[documents]`, `mammoth`+`markitdown[docx]` added; `python-docx` added to the dev group as a test-only docx WRITER (convert-md only reads docx). Minor bump 0.6.0 -> 0.7.0 per the shelf's semver discipline for behavior-changing engine swaps. `make check` green (316 passed, 88.69% cov). Open axes left for later (not blockers): OMML math (synthesis-weak), a marked-header table variant, and unifying convert-md on one canonical HTML renderer (its own real-web-corpus BENCH, touches a2web's live path)."
