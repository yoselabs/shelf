note = "EVOLVE: redesigned convert_md.fidelity.grade()'s signal set after a direct calibration check found it was a rubber stamp on the same real corpus the pdf-engine-verification work already built (ledger/0034, 0035). Ran grade() against all 39 completed bench/outputs/ conversions (5 engines x 8 documents) and every single one scored 'high' -- including outputs already known to be badly broken (docling dropping 100% of formulas, markitdown fusing sentences across a column break, unstructured shattering a financial table into isolated one-value-per-line noise 450 lines apart). Root cause: none of these defects produce garbled bytes or remove all tables/headings document-wide, the only two things the original three signals (yield, whole-document structure presence, encoding-garbage density) could see -- tuning the existing thresholds could not have fixed this, the signals were structurally blind to these failure shapes. Added two new signals, both calibrated against real measured values from the same corpus, not guessed: (1) cid-glyph-leak line-fraction -- literal `(cid:N)` tokens from an unresolved PDF font ToUnicode mapping, measured at 0.075-0.126 on known-bad markitdown/unstructured CJK output vs 0.0 on clean output, threshold set at 0.03; also independently caught markitdown mangling math notation in math_heavy.pdf (cid tokens replacing absolute-value bars inside a limit expression), reinforcing rather than contradicting the earlier semantic-recoverability finding. (2) shattered-table numeric-line-fraction -- isolated short numeric-only lines, the shape a table takes when an engine drops pipe/row syntax entirely, measured at 0.562 on unstructured's known-shattered financial table vs 0.260 on the highest legitimate numeric-dense case (pymupdf4llm's jammed-but-data-intact rows) and 0.0 on real markdown tables regardless of numeric density, threshold set at 0.35. Re-ran the same calibration check after the change: 7 of 39 real conversions now correctly grade 'partial' (previously all 39 graded 'high'); zero regressions on cases already known to be fine, including the cosmetically-broken-but-semantically-intact investor_infographics tables from docling/pymupdf4llm, which the addendum had already established should NOT be downgraded. Explicitly documented as a known, accepted, unfixed limitation: semantic corruption where text stays clean/well-formed/structurally-intact but is reordered, fused, or has a claim severed from its own value elsewhere in the file (markitdown's table_heavy.pdf and math_heavy.pdf reading-order defects) remains undetectable by any model-free heuristic -- stated in fidelity.py's docstring rather than silently missed, per the same track-the-reasons discipline as ledger/0035. check_fidelity_calibration.py kept in bench/ as a reusable, re-runnable calibration tool (D4 spirit extended from engine comparison to grading-heuristic verification). Two new tests added (test_dispatch.py) calibrated to the same real thresholds. `make check` green."
