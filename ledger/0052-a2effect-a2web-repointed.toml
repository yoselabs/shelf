note = "REPOINT, not a fresh adoption -- a2web was already consuming a2effect, but pinned against the a2kit REPOSITORY rather than the shelf, because the shelf's copy sat on the unmerged `work/a2kay` branch (ledger 0050). Worth recording as its own row because of what it cost: that single pin kept a2kit undissolvable for weeks AFTER its last consumer had migrated off every line of its framework code. a2web finished its sunset on 2026-07-22 with a2kit still in `uv.lock` -- for a package a2kit did not even own anymore. The lesson generalizes past this case: an unmerged promotion branch does not just hide a package from other sessions, it can PIN THE ORIGIN ALIVE, because the consumer has to source it from somewhere and the only reachable copy is the old home. That is a second, sharper argument for PROMOTE step 8 ('a promotion that never reaches main never happened') than the visibility one the loop currently gives. VERIFICATION: the shelf copy is NOT byte-identical to a2kit v0.49.2 -- it carries docstrings, a ruff EM101 refactor (`msg = ...; raise X(msg)`), and `noqa`/`ty` pragmas. Checked by AST-diffing both trees with docstrings stripped, rather than assuming a promoted package is a verbatim copy; then gated on a2web's wire goldens, since 'behaviourally equivalent' is a claim the error-envelope bytes can settle and a comment cannot. Zero golden deltas. a2web's `uv.lock` now contains no reference to a2kit at all."
