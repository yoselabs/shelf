[project]
name = "lean-wire"
version = "0.1.0"
description = "Token-lean agent-facing wire payloads — a truly line-oriented TSV codec + opt-in empty-field pruning, so a model reads data not noise."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lean_wire"]
