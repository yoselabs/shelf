[project]
name = "page-tsv"
version = "0.1.0"
description = "Type-driven, consumer-aware rendering of tool results — Page[T] + a render(value, *, consumer) seam that compresses scalar tables to lean-wire TSV for an LLM and stays plain JSON for code/machine callers."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2,<3",
    "lean-wire",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/page_tsv"]
