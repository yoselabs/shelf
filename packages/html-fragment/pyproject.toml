[project]
name = "html-fragment"
version = "0.1.0"
description = "Convert a server-supplied HTML fragment (a comment body, a Discourse `cooked`, a Habr `textHtml`) into link-preserving markdown or plain text — lxml-backed, entity-decoded."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "lxml>=5,<7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/html_fragment"]
