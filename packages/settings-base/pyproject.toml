[project]
name = "settings-base"
version = "0.1.0"
description = "Generic env/YAML machinery for pydantic-settings config — ${VAR} interpolation, optional-config-path resolution, and a secret-stripping YAML source."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "pydantic-settings>=2.5,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/settings_base"]
