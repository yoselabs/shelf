[project]
name = "timefmt"
version = "0.1.0"
description = "Adaptive duration formatter — units match magnitude, no wasted precision (ms / s / m·s)."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/timefmt"]
