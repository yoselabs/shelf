[project]
name = "git-porcelain"
version = "0.1.0"
description = "A pure, fail-loud git surface over the git binary — preserving the user's credential/config fidelity."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/git_porcelain"]
