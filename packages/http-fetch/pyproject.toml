[project]
name = "http-fetch"
version = "0.2.0"
description = "One HTTP-GET primitive over curl_cffi with browser TLS impersonation, conditional GET, injected proxy + breaker, and closed-verdict error mapping."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "curl_cffi>=0.7,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/http_fetch"]
