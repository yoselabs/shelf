[project]
name = "a2effect"
version = "0.1.0"
description = "Typed-error foundation for Python frameworks. Standalone, pydantic-only, adoptable by any framework wanting typed errors on the wire."
readme = "README.md"
authors = [{name = "Denis Tomilin"}]
requires-python = ">=3.11"
license = "Apache-2.0"
keywords = ["errors", "effect", "typed-errors", "mcp", "fastapi"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pydantic>=2,<3",
]

[project.optional-dependencies]
# `a2effect.testing` ships a pytest-based contract-test generator, so pytest is a
# real (opt-in) dependency of that module — base a2effect stays pydantic-only.
testing = ["pytest>=8,<9"]

# Lint rules ship here, registered for any conforming runner via entry points.
[project.entry-points."a2lint.rules"]
"A2K-RAISES-CLOSURE" = "a2effect._lint:raises_closure_rule"
"A2K-RAISES-UNCOVERED" = "a2effect._lint:raises_uncovered_rule"
"A2K-RAISES-NOT-TYPED" = "a2effect._lint:raises_not_typed_rule"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/a2effect"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers --import-mode=importlib"
asyncio_mode = "auto"

