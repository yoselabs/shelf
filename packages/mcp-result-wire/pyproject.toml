[project]
name = "mcp-result-wire"
version = "0.1.0"
description = "FastMCP result middleware — re-derive a tool's content channel from an encoding plan (token-lean TSV/page-tsv) and project/paginate list results, driven by per-tool registries not framework metadata."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "page-tsv",
    "fastmcp>=3,<4",
    "mcp>=1.28,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_result_wire"]
