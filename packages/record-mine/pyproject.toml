[project]
name = "record-mine"
version = "0.1.0"
description = "Locate the dominant repeated-record region on a listing / index / threaded-discussion page (which article extractors discard as boilerplate) and render it to link-preserving markdown."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "lxml>=5,<7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/record_mine"]
