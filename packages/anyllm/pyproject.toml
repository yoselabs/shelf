[project]
name = "anyllm"
version = "0.1.0"
description = "Stop caring which LLM provider is underneath — a neutral completion interface with claude-code-cli + anthropic-api backends."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "httpx>=0.27,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anyllm"]
