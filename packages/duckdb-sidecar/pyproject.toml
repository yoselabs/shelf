[project]
name = "duckdb-sidecar"
version = "0.1.0"
description = "Shared DuckDB sidecar connection helper — normalize the target, create the parent directory, support :memory:, connect."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "duckdb>=1,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/duckdb_sidecar"]
