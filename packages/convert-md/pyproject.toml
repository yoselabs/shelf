[project]
name = "convert-md"
version = "0.1.0"
description = "Opinionated documentâ†’markdown conversion: multi-engine per-format fallback chains + a model-free fidelity grade."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
keywords = ["markdown", "conversion", "docling", "pandoc", "pdf", "docx"]
dependencies = [
    "docling>=2",
    "pypandoc-binary>=1.17",
    "markitdown>=0.0.2",
    "python-pptx>=1.0.2",
    "trafilatura>=1.9.0",
    "readability-lxml>=0.8.4.1",
    "html2text>=2025.4.15",
    "openpyxl>=3.1.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/convert_md"]
