[project]
name = "http-cache"
version = "0.1.0"
description = "A conditional-GET HTTP response cache on sqlite: ETag / Last-Modified / TTL / gzip body, keyed by (url, variant)."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "sqlite-resource",
]

[tool.uv.sources]
sqlite-resource = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/http_cache"]
