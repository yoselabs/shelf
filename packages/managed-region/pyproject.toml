[project]
name = "managed-region"
version = "0.1.0"
description = "Idempotent, prose-preserving machine-owned block between markers — the direnv/terraform managed-block pattern, marker-agnostic."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/managed_region"]
