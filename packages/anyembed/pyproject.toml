[project]
name = "anyembed"
version = "0.1.0"
description = "Stop caring which embedding backend is underneath — a neutral Embedder interface with a local transformers (BGE) backend."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "torch>=2.4",
    "transformers>=4.40,<6",
    "numpy>=1.24,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anyembed"]
