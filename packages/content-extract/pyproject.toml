[project]
name = "content-extract"
version = "0.1.0"
description = "Extract a web page's main content to Markdown plus structured metadata (title, byline, date), headings, and role-classified links."
readme = "README.md"
authors = [{ name = "Denis Tomilin" }]
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "convert-md",
    "trafilatura>=1.12,<2",
    "selectolax>=0.3,<1",
]

[tool.uv.sources]
convert-md = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/content_extract"]
